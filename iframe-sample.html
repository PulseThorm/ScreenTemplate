<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Iframe Test</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #101a27;
            color: #eef4ff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .wrap {
            width: 100%;
            height: 100%;
            display: table;
        }

        .center {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
            padding: 20px;
        }

        .badge {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: #d40000;
            color: #fff;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="center">
            <div class="badge">IFRAME OK</div>
            <div>Local iframe content loaded successfully.</div>
        </div>
    </div>
</body>
</html>
